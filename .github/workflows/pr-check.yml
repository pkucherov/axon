name: PR Requirements

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-issue-link:
    name: Verify linked issue
    runs-on: ubuntu-latest
    if: github.actor != 'harshkedia177'
    steps:
      - name: Check for issue reference
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const title = context.payload.pull_request.title || '';

            // Match patterns like "Closes #123", "Fixes #123", "Resolves #123", "#123"
            const issuePattern = /(close[sd]?|fix(es|ed)?|resolve[sd]?)\s+#(\d+)/gi;
            const directRef = /#(\d+)/g;

            const hasClosingRef = issuePattern.test(body);
            const hasAnyRef = directRef.test(body);

            // Check diff size for the trivial-fix exemption
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const isTrivial = (pr.additions + pr.deletions) <= 5;

            if (!hasAnyRef && !isTrivial) {
              core.setFailed(
                '❌ This PR has no linked issue.\n\n' +
                'Every PR must reference an approved issue (e.g., "Closes #42" in the description).\n\n' +
                'Workflow: Open an issue → get `approved` label → then open a PR.\n\n' +
                'See CONTRIBUTING.md for details.'
              );
              return;
            }

            if (hasAnyRef && !hasClosingRef) {
              core.warning(
                '⚠️ Found an issue reference but no closing keyword. ' +
                'Use "Closes #N" or "Fixes #N" to auto-close the issue on merge.'
              );
            }

            console.log('✅ Issue reference found.');
